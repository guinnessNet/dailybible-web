<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>데일리바이블</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Roboto, sans-serif;
      background: #f5f6f8; color: #1f2937; padding: 24px;
    }
    @media (prefers-color-scheme: dark) { body { background: #0f172a; color: #e5e7eb; } .card { background:#1e293b !important; } .sub{color:#94a3b8 !important;} }
    .card {
      max-width: 420px; width: 100%; background: #fff; border-radius: 20px; padding: 40px 28px;
      text-align: center; box-shadow: 0 10px 40px rgba(30,58,95,.12);
    }
    .icon { width: 84px; height: 84px; border-radius: 20px; background: #1e3a5f; margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 1.3rem; margin: 0 0 8px; }
    .sub { color: #6b7280; font-size: .98rem; line-height: 1.6; margin: 0 0 24px; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700;
      text-decoration: none; margin-top: 10px; }
    .primary { background: #1e3a5f; color: #fff; }
    .ghost { background: transparent; color: #1e3a5f; }
    @media (prefers-color-scheme: dark){ .ghost{ color:#93b4d8; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 6c-1.5-1-3.5-1.5-5.5-1.5S3 5 3 5v13s1-.5 3.5-.5S12 19 12 19m0-13c1.5-1 3.5-1.5 5.5-1.5S21 5 21 5v13s-1-.5-3.5-.5S12 19 12 19m0-13v13" stroke="#e8b84b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 id="title">데일리바이블</h1>
    <p class="sub" id="sub">페이지를 찾을 수 없습니다.</p>
    <a class="btn primary" id="cta" href="https://play.google.com/store/apps/details?id=kr.dailybible.app">Google Play에서 설치</a>
    <a class="btn ghost" href="/">데일리바이블 홈</a>
  </div>
  <script>
    // 구절 묶음 공유 링크(https://dailybible.kr/s/...)를 앱 없이 열었을 때의 폴백.
    // 앱이 설치·검증돼 있으면 Android App Link가 가로채 앱이 열리므로 이 페이지는 안 보인다.
    if (location.pathname.indexOf('/s') === 0) {
      document.getElementById('title').textContent = '공유된 구절 묶음';
      document.getElementById('sub').innerHTML = '이 링크는 <b>데일리바이블</b> 앱에서 열 수 있는 구절 묶음이에요.<br>앱을 설치하면 바로 볼 수 있습니다.';
      // 앱이 있는데 안 열렸을 수도 있으니 한 번 앱 실행을 시도(커스텀 스킴)
      var deep = 'dailybible://' + location.pathname.replace(/^\/s\/?/, 's/') + location.search + location.hash;
      setTimeout(function(){ try { location.href = deep; } catch(e){} }, 300);
    }
  </script>
</body>
</html>
