<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd76a;stop-opacity:0.75"/>
      <stop offset="55%" style="stop-color:#f5b429;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f5b429;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3c4"/>
      <stop offset="100%" style="stop-color:#f0a91f"/>
    </linearGradient>
    <clipPath id="above">
      <rect x="0" y="0" width="64" height="34"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0d284e"/>

  <!-- 해·광선: 책 뒤에서 떠오르므로 위쪽만 보이게 클립 -->
  <g clip-path="url(#above)">
    <circle cx="32" cy="32" r="20" fill="url(#glow)"/>
    <g stroke="#f7c53d" stroke-width="1.1" stroke-linecap="round">
      <line x1="32" y1="32" x2="32" y2="7"/>
      <line x1="32" y1="32" x2="24" y2="9"/>
      <line x1="32" y1="32" x2="40" y2="9"/>
      <line x1="32" y1="32" x2="17" y2="14"/>
      <line x1="32" y1="32" x2="47" y2="14"/>
      <line x1="32" y1="32" x2="12" y2="21"/>
      <line x1="32" y1="32" x2="52" y2="21"/>
      <line x1="32" y1="32" x2="9"  y2="30"/>
      <line x1="32" y1="32" x2="55" y2="30"/>
    </g>
    <circle cx="32" cy="32" r="7.5" fill="url(#sun)"/>
  </g>

  <!-- 펼친 책 -->
  <g stroke="#f0a91f" stroke-width="1.6" stroke-linejoin="round">
    <path d="M32,38 C26,32 17,30 9,32 L14,50 C22,48.5 28,50 32,54 Z" fill="#fdf6e3"/>
    <path d="M32,38 C38,32 47,30 55,32 L50,50 C42,48.5 36,50 32,54 Z" fill="#fdf6e3"/>
  </g>
  <path d="M32,38 L32,54" stroke="#16355e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
